services:
  - type: web
    name: wfconnect
    runtime: node
    plan: free
    buildCommand: npm install && npm run server:build
    startCommand: npm run server:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wfconnect-db
          property: connectionString
      - key: SESSION_SECRET
        sync: false
      - key: OPENPHONE_API_KEY
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: WEEKDAYS_API_KEY
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_BOT_ENABLED
        value: "false"
      - key: AI_INTEGRATIONS_ANTHROPIC_API_KEY
        sync: false
      - key: AI_INTEGRATIONS_ANTHROPIC_BASE_URL
        sync: false
      - key: AI_INTEGRATIONS_OPENAI_API_KEY
        sync: false
      - key: AI_INTEGRATIONS_OPENAI_BASE_URL
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: WEEKDAYS_TEAM_ID
        sync: false

databases:
  - name: wfconnect-db
    plan: free
    databaseName: wfconnect
