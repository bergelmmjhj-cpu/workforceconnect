<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Applicants — WFConnect Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #6C5CE7;
      --primary-dark: #5849c7;
      --primary-light: #a29bfe;
      --bg: #f7f8fc;
      --card: #ffffff;
      --text: #1a1a2e;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --border: #e5e7eb;
      --error: #ef4444;
      --success: #22c55e;
      --warning: #f59e0b;
      --info: #3b82f6;
      --radius: 12px;
    }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Login Screen */
    .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .login-card { background: var(--card); border-radius: 16px; box-shadow: 0 4px 24px rgba(108,92,231,0.12); padding: 40px; max-width: 400px; width: 100%; text-align: center; }
    .login-logo { display: inline-flex; align-items: center; justify-content: center; margin-bottom: 8px; }
    .login-logo img { height: 52px; width: auto; display: block; }
    .login-subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 32px; }
    .form-group { margin-bottom: 16px; text-align: left; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text-secondary); }
    .form-group input { width: 100%; height: 48px; padding: 0 16px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 15px; outline: none; transition: border-color .15s; }
    .form-group input:focus { border-color: var(--primary); }
    .login-btn { width: 100%; height: 48px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: background .15s; }
    .login-btn:hover { background: var(--primary-dark); }
    .login-btn:disabled { opacity: .6; cursor: not-allowed; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 16px 0; color: var(--text-muted); font-size: 13px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    #g_signin_btn { width: 100%; display: flex; justify-content: center; margin-bottom: 4px; min-height: 44px; }
    .login-error { color: var(--error); font-size: 13px; margin-top: 12px; display: none; }
    .login-error.show { display: block; }

    /* Dashboard */
    .dashboard { display: none; }
    .dashboard.show { display: block; }
    .topbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar-logo { display: flex; align-items: center; gap: 8px; }
    .topbar-logo .icon { width: 36px; height: 36px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .topbar-logo .icon svg { width: 20px; height: 20px; fill: white; }
    .topbar-logo .brand { font-size: 18px; font-weight: 700; }
    .topbar-logo .brand span { color: var(--primary); }
    .topbar-title { font-size: 14px; color: var(--text-secondary); padding-left: 12px; border-left: 1px solid var(--border); }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .topbar-user { font-size: 13px; color: var(--text-secondary); }
    .logout-btn { padding: 8px 16px; background: none; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text-secondary); transition: all .15s; }
    .logout-btn:hover { border-color: var(--error); color: var(--error); }

    .content { max-width: 1200px; margin: 0 auto; padding: 24px; }

    /* Stats Row */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; }
    .stat-num { font-size: 28px; font-weight: 800; }
    .stat-label { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-top: 4px; }

    /* Controls */
    .controls { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .search-input { flex: 1; min-width: 200px; height: 44px; padding: 0 16px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; outline: none; }
    .search-input:focus { border-color: var(--primary); }
    .filter-select { height: 44px; padding: 0 12px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; outline: none; background: white; min-width: 140px; }
    .filter-select:focus { border-color: var(--primary); }
    .refresh-btn { height: 44px; padding: 0 20px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background .15s; white-space: nowrap; }
    .refresh-btn:hover { background: var(--primary-dark); }

    /* Table */
    .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead th { background: #f8f9fb; padding: 12px 16px; text-align: left; font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); }
    tbody td { padding: 14px 16px; font-size: 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tbody tr { cursor: pointer; transition: background .1s; }
    tbody tr:hover { background: #f8f9fb; }
    tbody tr:last-child td { border-bottom: none; }
    .applicant-name { font-weight: 600; }
    .applicant-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* Status Badge */
    .status-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; text-transform: capitalize; }
    .status-new { background: #dbeafe; color: #1d4ed8; }
    .status-reviewing { background: #fef3c7; color: #92400e; }
    .status-interviewed { background: #e0e7ff; color: #4338ca; }
    .status-hired { background: #dcfce7; color: #166534; }
    .status-rejected { background: #fee2e2; color: #991b1b; }

    .no-data { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .no-data-icon { font-size: 48px; margin-bottom: 12px; }
    .no-data-text { font-size: 15px; }
    .loading { text-align: center; padding: 40px; color: var(--text-muted); }

    /* Detail Panel */
    .detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; }
    .detail-overlay.show { display: flex; justify-content: flex-end; }
    .detail-panel { width: 520px; max-width: 100%; background: var(--card); height: 100vh; overflow-y: auto; box-shadow: -4px 0 24px rgba(0,0,0,.1); padding: 0; animation: slideIn .2s ease; }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .detail-header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; position: sticky; top: 0; background: var(--card); z-index: 1; }
    .detail-close { width: 36px; height: 36px; border: 1px solid var(--border); border-radius: 8px; background: white; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all .15s; }
    .detail-close:hover { border-color: var(--error); color: var(--error); }
    .detail-name { font-size: 22px; font-weight: 700; }
    .detail-phone { color: var(--text-secondary); font-size: 14px; margin-top: 4px; }
    .detail-body { padding: 24px; }
    .detail-section { margin-bottom: 24px; }
    .detail-section-title { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }
    .detail-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .detail-label { font-size: 13px; color: var(--text-muted); min-width: 100px; flex-shrink: 0; }
    .detail-value { font-size: 14px; font-weight: 500; }

    .doc-btns { display: flex; gap: 12px; flex-wrap: wrap; }
    .doc-btn { display: flex; align-items: center; gap: 8px; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 10px; background: white; cursor: pointer; transition: all .15s; font-size: 13px; font-weight: 600; flex: 1; min-width: 180px; }
    .doc-btn:hover { border-color: var(--primary); background: #f3f0ff; }
    .doc-btn.disabled { opacity: .4; cursor: not-allowed; }
    .doc-btn.disabled:hover { border-color: var(--border); background: white; }
    .doc-icon { font-size: 24px; }

    .status-actions { margin-top: 20px; }
    .status-actions-label { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 10px; }
    .status-btns { display: flex; gap: 8px; flex-wrap: wrap; }
    .status-btn { padding: 8px 16px; border-radius: 8px; border: 1.5px solid var(--border); background: white; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; text-transform: capitalize; }
    .status-btn:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .status-btn.active { border-width: 2px; font-weight: 700; }
    .status-btn[data-status="new"] { color: #1d4ed8; }
    .status-btn[data-status="new"]:hover, .status-btn[data-status="new"].active { background: #dbeafe; border-color: #1d4ed8; }
    .status-btn[data-status="reviewing"] { color: #92400e; }
    .status-btn[data-status="reviewing"]:hover, .status-btn[data-status="reviewing"].active { background: #fef3c7; border-color: #92400e; }
    .status-btn[data-status="interviewed"] { color: #4338ca; }
    .status-btn[data-status="interviewed"]:hover, .status-btn[data-status="interviewed"].active { background: #e0e7ff; border-color: #4338ca; }
    .status-btn[data-status="hired"] { color: #166534; }
    .status-btn[data-status="hired"]:hover, .status-btn[data-status="hired"].active { background: #dcfce7; border-color: #166534; }
    .status-btn[data-status="rejected"] { color: #991b1b; }
    .status-btn[data-status="rejected"]:hover, .status-btn[data-status="rejected"].active { background: #fee2e2; border-color: #991b1b; }

    .toast { position: fixed; bottom: 24px; right: 24px; padding: 14px 24px; border-radius: 10px; color: white; font-size: 14px; font-weight: 600; z-index: 200; transform: translateY(100px); opacity: 0; transition: all .3s; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--error); }

    @media (max-width: 768px) {
      .controls { flex-direction: column; }
      .search-input { min-width: unset; }
      .detail-panel { width: 100%; }
      .topbar { padding: 12px 16px; }
      .topbar-title { display: none; }
      .content { padding: 16px; }
      .stats-row { grid-template-columns: repeat(3, 1fr); }
      table { font-size: 13px; }
      thead th, tbody td { padding: 10px 12px; }
      .hide-mobile { display: none; }
    }
  </style>
</head>
<body>

<!-- Login Screen -->
<div class="login-container" id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <img src="/logo.png" alt="WFConnect" />
    </div>
    <div class="login-subtitle">Applicants Portal — Admin Access</div>
    <div id="google-signin-section">
      <div id="g_signin_btn" style="display:flex;justify-content:center;margin-bottom:4px;"></div>
      <div class="divider">or sign in with email</div>
    </div>
    <form id="login-form">
      <div id="credentials-fields">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="admin@wfconnect.org" autocomplete="email" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password" />
        </div>
      </div>
      <div id="totp-fields" style="display:none;">
        <div class="form-group">
          <label>Two-Factor Authentication Code</label>
          <input type="text" id="login-totp" placeholder="Enter 6-digit code" maxlength="8" autocomplete="one-time-code" inputmode="numeric" style="text-align:center;font-size:1.2em;letter-spacing:4px;" />
        </div>
        <div style="font-size:0.85em;color:#6B7280;margin-bottom:12px;">Enter the code from your authenticator app or a recovery code.</div>
      </div>
      <button type="submit" class="login-btn" id="login-btn">Sign In</button>
      <div class="login-error" id="login-error"></div>
    </form>
  </div>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboard">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">
        <img src="/logo.png" alt="WFConnect" style="height:36px;width:auto;" />
      </div>
      <div class="topbar-title">Applicants</div>
    </div>
    <div class="topbar-right">
      <span class="topbar-user" id="user-display"></span>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <div class="content">
    <div class="stats-row" id="stats-row"></div>

    <div class="controls">
      <input type="text" class="search-input" id="search-input" placeholder="Search by name or phone..." />
      <select class="filter-select" id="status-filter">
        <option value="all">All Statuses</option>
        <option value="new">New</option>
        <option value="reviewing">Reviewing</option>
        <option value="interviewed">Interviewed</option>
        <option value="hired">Hired</option>
        <option value="rejected">Rejected</option>
      </select>
      <button class="refresh-btn" onclick="loadApplicants()">Refresh</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Applicant</th>
            <th>Position</th>
            <th class="hide-mobile">Location</th>
            <th class="hide-mobile">Source</th>
            <th>Status</th>
            <th class="hide-mobile">Date</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="6" class="loading">Loading applicants...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Detail Side Panel -->
<div class="detail-overlay" id="detail-overlay" onclick="closeDetail(event)">
  <div class="detail-panel" id="detail-panel" onclick="event.stopPropagation()">
    <div class="detail-header">
      <div>
        <div class="detail-name" id="detail-name"></div>
        <div class="detail-phone" id="detail-phone"></div>
      </div>
      <button class="detail-close" onclick="closeDetail()">&times;</button>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const GOOGLE_CLIENT_ID = '__GOOGLE_CLIENT_ID__';
let currentUser = null;
let applicants = [];
let searchTimer = null;
let pending2FAUserId = null;
let googleInitialized = false;

function initGoogleSignIn() {
  if (!window.google || !GOOGLE_CLIENT_ID || googleInitialized) return;
  googleInitialized = true;
  window.google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: handleGoogleCredential,
    auto_select: false,
    cancel_on_tap_outside: true,
  });
  const btnContainer = document.getElementById('g_signin_btn');
  if (btnContainer) {
    btnContainer.innerHTML = '';
    window.google.accounts.id.renderButton(btnContainer, {
      theme: 'outline',
      size: 'large',
      width: '100%',
      text: 'signin_with',
    });
  }
}

window.addEventListener('load', () => { setTimeout(initGoogleSignIn, 500); });

async function handleGoogleCredential(response) {
  try {
    const resp = await apiFetch('/api/auth/google', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ idToken: response.credential }),
    });
    const data = await resp.json();

    if (!resp.ok) throw new Error(data.error || 'Google sign-in failed');
    if (data.pending) throw new Error('Your account is pending admin approval');
    if (data.registered) throw new Error('Account created — pending admin approval');

    if (data.requires2FA) {
      pending2FAUserId = data.userId;
      document.getElementById('google-signin-section').style.display = 'none';
      document.getElementById('credentials-fields').style.display = 'none';
      document.getElementById('totp-fields').style.display = 'block';
      document.getElementById('login-btn').textContent = 'Verify';
      document.getElementById('login-btn').style.display = 'block';
      document.getElementById('login-totp').focus();
      return;
    }

    if (!data.user) throw new Error('Google sign-in failed');
    const role = data.user.role;
    if (role !== 'admin' && role !== 'hr') throw new Error('Access denied — admin or HR role required');

    currentUser = data.user;
    showDashboard();
  } catch (err) {
    showToast(err.message, 'error');
  }
}

function getHeaders() {
  return { 'Content-Type': 'application/json' };
}

async function apiFetch(url, opts = {}) {
  const resp = await fetch(url, { ...opts, credentials: 'include' });
  if ((resp.status === 401 || resp.status === 403) && currentUser && !url.includes('/api/auth/')) {
    showLogin();
    showToast('Session expired — please sign in again', 'error');
  }
  return resp;
}

(async function init() {
  try {
    const resp = await apiFetch('/api/auth/me');
    if (resp.ok) {
      const data = await resp.json();
      if (data.user && (data.user.role === 'admin' || data.user.role === 'hr')) {
        currentUser = data.user;
        showDashboard();
        return;
      }
    }
  } catch {}
  showLogin();
})();

function showLogin() {
  currentUser = null;
  pending2FAUserId = null;
  googleInitialized = false;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('dashboard').classList.remove('show');
  document.getElementById('google-signin-section').style.display = 'block';
  document.getElementById('credentials-fields').style.display = 'block';
  document.getElementById('totp-fields').style.display = 'none';
  document.getElementById('login-btn').textContent = 'Sign In';
  document.getElementById('login-error').classList.remove('show');
  setTimeout(initGoogleSignIn, 300);
}

function showDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').classList.add('show');
  document.getElementById('user-display').textContent = esc(currentUser.fullName || currentUser.email) + ' (' + esc(currentUser.role) + ')';
  loadApplicants();
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');

  btn.disabled = true;
  errEl.classList.remove('show');

  try {
    if (pending2FAUserId) {
      btn.textContent = 'Verifying...';
      const code = document.getElementById('login-totp').value.trim();
      if (!code) throw new Error('Please enter your verification code');

      const resp = await apiFetch('/api/2fa/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: pending2FAUserId, code }),
      });
      const data = await resp.json();
      if (!resp.ok || !data.verified) throw new Error(data.error || 'Invalid code');

      const role = data.user.role;
      if (role !== 'admin' && role !== 'hr') throw new Error('Access denied — admin or HR role required');

      currentUser = data.user;
      pending2FAUserId = null;
      showDashboard();
    } else {
      btn.textContent = 'Signing in...';
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      if (!email) throw new Error('Please enter your email address');
      if (!password) throw new Error('Please enter your password');

      const resp = await apiFetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await resp.json();

      if (!resp.ok) throw new Error(data.error || 'Login failed');
      if (data.pending) throw new Error('Account pending approval');

      if (data.requires2FA) {
        pending2FAUserId = data.userId;
        document.getElementById('google-signin-section').style.display = 'none';
        document.getElementById('credentials-fields').style.display = 'none';
        document.getElementById('totp-fields').style.display = 'block';
        document.getElementById('login-btn').textContent = 'Verify';
        document.getElementById('login-totp').focus();
        return;
      }

      if (!data.user) throw new Error('Login failed');

      const role = data.user.role;
      if (role !== 'admin' && role !== 'hr') throw new Error('Access denied — admin or HR role required');

      currentUser = data.user;
      showDashboard();
    }
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.add('show');
  } finally {
    btn.disabled = false;
    if (!pending2FAUserId) btn.textContent = 'Sign In';
  }
});

async function logout() {
  try { await apiFetch('/api/auth/logout', { method: 'POST' }); } catch {}
  showLogin();
}

// Load applicants
async function loadApplicants() {
  const search = document.getElementById('search-input').value.trim();
  const status = document.getElementById('status-filter').value;
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '<tr><td colspan="6" class="loading">Loading...</td></tr>';

  try {
    const params = new URLSearchParams();
    if (search) params.set('search', search);
    if (status !== 'all') params.set('status', status);
    params.set('limit', '200');

    const resp = await apiFetch('/api/applicants?' + params.toString(), { headers: getHeaders() });
    if (resp.status === 403 || resp.status === 401) { showLogin(); return; }
    if (!resp.ok) throw new Error('Failed to fetch');

    applicants = await resp.json();
    renderStats();
    renderTable();
  } catch (err) {
    tbody.innerHTML = '<tr><td colspan="6" class="no-data"><div class="no-data-icon">&#9888;</div><div class="no-data-text">Failed to load applicants</div></td></tr>';
  }
}

function renderStats() {
  const counts = { total: applicants.length, new: 0, reviewing: 0, interviewed: 0, hired: 0, rejected: 0 };
  applicants.forEach(a => { if (counts[a.status] !== undefined) counts[a.status]++; });

  const stats = [
    { num: counts.total, label: 'Total', color: 'var(--primary)' },
    { num: counts.new, label: 'New', color: '#1d4ed8' },
    { num: counts.reviewing, label: 'Reviewing', color: '#92400e' },
    { num: counts.interviewed, label: 'Interviewed', color: '#4338ca' },
    { num: counts.hired, label: 'Hired', color: 'var(--success)' },
    { num: counts.rejected, label: 'Rejected', color: 'var(--error)' },
  ];

  document.getElementById('stats-row').innerHTML = stats.map(s =>
    `<div class="stat-card"><div class="stat-num" style="color:${s.color}">${s.num}</div><div class="stat-label">${s.label}</div></div>`
  ).join('');
}

function renderTable() {
  const tbody = document.getElementById('table-body');
  if (applicants.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="no-data"><div class="no-data-icon">&#128203;</div><div class="no-data-text">No applicants found</div></td></tr>';
    return;
  }

  tbody.innerHTML = applicants.map(a => {
    const date = new Date(a.submittedAt);
    const dateStr = date.toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' });
    const city = [a.addressCity, a.addressProvince].filter(Boolean).join(', ') || '—';
    return `<tr onclick="openDetail('${escAttr(a.id)}')">
      <td><div class="applicant-name">${esc(a.fullName)}</div><div class="applicant-meta">${esc(a.phone)}</div></td>
      <td>${esc(a.applyingFor)}</td>
      <td class="hide-mobile">${esc(city)}</td>
      <td class="hide-mobile">${esc(a.jobPostingSource || '—')}</td>
      <td><span class="status-badge status-${escAttr(a.status)}">${esc(a.status)}</span></td>
      <td class="hide-mobile">${dateStr}</td>
    </tr>`;
  }).join('');
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function escAttr(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Detail panel
async function openDetail(id) {
  const overlay = document.getElementById('detail-overlay');
  overlay.classList.add('show');

  document.getElementById('detail-name').textContent = 'Loading...';
  document.getElementById('detail-phone').textContent = '';
  document.getElementById('detail-body').innerHTML = '<div class="loading">Loading details...</div>';

  try {
    const resp = await apiFetch('/api/applicants/' + id, { headers: getHeaders() });
    if (!resp.ok) throw new Error('Failed');
    const data = await resp.json();
    renderDetail(data);
  } catch {
    document.getElementById('detail-body').innerHTML = '<div class="no-data"><div class="no-data-text">Failed to load details</div></div>';
  }
}

function renderDetail(a) {
  document.getElementById('detail-name').textContent = a.fullName;
  document.getElementById('detail-phone').textContent = a.phone;

  const date = new Date(a.submittedAt);
  const dateStr = date.toLocaleDateString('en-CA', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });

  const statuses = ['new', 'reviewing', 'interviewed', 'hired', 'rejected'];

  document.getElementById('detail-body').innerHTML = `
    <div class="detail-section">
      <div class="detail-section-title">Personal Information</div>
      <div class="detail-row"><div class="detail-label">Address</div><div class="detail-value">${esc(a.addressFull || '—')}</div></div>
      <div class="detail-row"><div class="detail-label">City</div><div class="detail-value">${esc(a.addressCity || '—')}, ${esc(a.addressProvince || '')}</div></div>
      <div class="detail-row"><div class="detail-label">Postal Code</div><div class="detail-value">${esc(a.addressPostalCode || '—')}</div></div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Position Details</div>
      <div class="detail-row"><div class="detail-label">Position</div><div class="detail-value">${esc(a.applyingFor)}</div></div>
      <div class="detail-row"><div class="detail-label">Source</div><div class="detail-value">${esc(a.jobPostingSource || '—')}</div></div>
      <div class="detail-row"><div class="detail-label">Submitted</div><div class="detail-value">${dateStr}</div></div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Documents</div>
      <div class="doc-btns">
        <button class="doc-btn ${a.hasPhoto ? '' : 'disabled'}" onclick="${a.hasPhoto ? `downloadDoc('${escAttr(a.id)}', 'photo')` : ''}" ${a.hasPhoto ? '' : 'disabled'}>
          <span class="doc-icon">📷</span>
          <div>
            <div>${esc(a.photoFilename) || 'Profile Photo'}</div>
            <div style="font-size:11px;color:var(--text-muted);font-weight:400">${a.hasPhoto ? 'Click to download' : 'Not uploaded'}</div>
          </div>
        </button>
        <button class="doc-btn ${a.hasResume ? '' : 'disabled'}" onclick="${a.hasResume ? `downloadDoc('${escAttr(a.id)}', 'resume')` : ''}" ${a.hasResume ? '' : 'disabled'}>
          <span class="doc-icon">📄</span>
          <div>
            <div>${esc(a.resumeFilename) || 'Resume'}</div>
            <div style="font-size:11px;color:var(--text-muted);font-weight:400">${a.hasResume ? 'Click to download' : 'Not uploaded'}</div>
          </div>
        </button>
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">Status</div>
      <div style="margin-bottom:12px"><span class="status-badge status-${escAttr(a.status)}">${esc(a.status)}</span></div>
      <div class="status-actions">
        <div class="status-actions-label">Change status:</div>
        <div class="status-btns">
          ${statuses.map(s => `<button class="status-btn ${s === a.status ? 'active' : ''}" data-status="${escAttr(s)}" onclick="updateStatus('${escAttr(a.id)}', '${escAttr(s)}')">${esc(s)}</button>`).join('')}
        </div>
      </div>
    </div>
  `;
}

function closeDetail(event) {
  if (event && event.target !== document.getElementById('detail-overlay')) return;
  document.getElementById('detail-overlay').classList.remove('show');
}

// Download docs
function downloadDoc(id, type) {
  const url = '/api/applicants/' + id + '/download/' + type;
  const headers = getHeaders();
  apiFetch(url, { headers })
    .then(resp => {
      if (!resp.ok) throw new Error('Download failed');
      return resp.blob();
    })
    .then(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = type === 'photo' ? 'photo' : 'resume';
      document.body.appendChild(a);
      a.click();
      a.remove();
    })
    .catch(() => showToast('Download failed', 'error'));
}

// Update status
async function updateStatus(id, newStatus) {
  try {
    const resp = await apiFetch('/api/applicants/' + id + '/status', {
      method: 'PATCH',
      headers: getHeaders(),
      body: JSON.stringify({ status: newStatus }),
    });
    if (!resp.ok) throw new Error('Failed');
    showToast('Status updated to ' + newStatus, 'success');
    openDetail(id);
    loadApplicants();
  } catch {
    showToast('Failed to update status', 'error');
  }
}

// Toast notification
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Search debounce
document.getElementById('search-input').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(loadApplicants, 400);
});
document.getElementById('status-filter').addEventListener('change', loadApplicants);
</script>
</body>
</html>
